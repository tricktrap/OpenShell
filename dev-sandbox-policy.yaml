# Development sandbox policy
version: 1

filesystem:
  include_workdir: true
  read_only:
    - /usr
    - /lib
  read_write:
    - /sandbox
    - /tmp

network:
  # allow | block | proxy
  mode: proxy
  proxy:
    http_addr: 127.0.0.1:3128
    allow_hosts:
      - api.anthropic.com
      - api.openai.com

landlock:
  # best_effort | hard_requirement
  compatibility: best_effort

process:
  run_as_user: sandbox
  run_as_group: sandbox
